<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI PDF Assistant</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="app">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <div class="logo">
            🤖 AI Assistant
        </div>

        <div class="menu-title">📄 My PDFs</div>

        <div id="pdf-list"></div>

    </div>


    <!-- CHAT + PDF AREA -->
    <div class="chat-area">

        <!-- CHAT -->
        <div class="chat-container">

            <div class="header">
                Ask questions from your PDFs
            </div>

            <div id="chat" class="chat-box"></div>

            <div class="input-area">
                <input 
                    id="question"
                    placeholder="Ask anything..."
                    onkeydown="if(event.key==='Enter') ask()"
                >

                <button onclick="ask()">Send</button>
            </div>

        </div>

        <!-- PDF VIEWER -->
        <iframe id="pdf-viewer"></iframe>

    </div>

</div>


<script>

//////////////////////////////////////////////////////
// PDF TOGGLE (OPEN / CLOSE)
//////////////////////////////////////////////////////

let openedPDF = null;

function openPDF(file){

    const viewer = document.getElementById("pdf-viewer");
    const chat = document.querySelector(".chat-container");

    // 👉 Αν πατήσεις το ίδιο PDF → κλείνει
    if(openedPDF === file){

        viewer.style.display = "none";
        viewer.src = "";

        chat.style.width = "100%";

        openedPDF = null;
        return;
    }

    // 👉 Άνοιξε PDF
    viewer.src = "/pdf/" + file;
    viewer.style.display = "block";

    chat.style.width = "50%";

    openedPDF = file;
}



//////////////////////////////////////////////////////
// LOAD PDFs
//////////////////////////////////////////////////////

async function loadPDFs(){

    const res = await fetch("/pdfs");
    const files = await res.json();

    const list = document.getElementById("pdf-list");

    list.innerHTML = "";

    files.forEach(file => {

        list.innerHTML += `
            <div class="pdf-item" onclick="openPDF('${file}')">
                ${file}
            </div>
        `;
    });
}


//////////////////////////////////////////////////////
// ASK AI
//////////////////////////////////////////////////////

async function ask(){

    const input = document.getElementById("question");
    const chat = document.getElementById("chat");

    const question = input.value.trim();

    if(!question) return;

    // USER MESSAGE
    chat.innerHTML += `
        <div class="message user">
            ${question}
        </div>
    `;

    input.value="";
    chat.scrollTop = chat.scrollHeight;


    // TYPING
    chat.innerHTML += `
        <div class="message bot" id="typing">
            Thinking...
        </div>
    `;

    chat.scrollTop = chat.scrollHeight;

    try{

        const res = await fetch("/ask",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body: JSON.stringify({question})
        });

        const data = await res.json();

        document.getElementById("typing").remove();

        chat.innerHTML += `
            <div class="message bot">
                ${data.answer}
            </div>
        `;

        chat.scrollTop = chat.scrollHeight;

    }catch(err){

        document.getElementById("typing").innerText = "Error contacting AI.";

    }
}


//////////////////////////////////////////////////////
// ON LOAD
//////////////////////////////////////////////////////

window.onload = () => {
    loadPDFs();
};

</script>

</body>
</html>
